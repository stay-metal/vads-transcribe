# DialogScribe — nginx как ЕДИНСТВЕННЫЙ ingress (спека §2/§8).
# Терминирует TLS; порты api/worker наружу НЕ публикуются (только этот сервер).

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;   # HTTP → HTTPS
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Большие загрузки (записи до ~3 ГБ/файл); серверная пере-проверка лимитов — в api.
    client_max_body_size 3g;

    # Реальный client-IP только из доверенной подсети compose (анти-spoof XFF).
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Defense-in-depth: статичные заголовки дублируются здесь с `always` — иначе
    # страницы самого nginx (502 при лежащем api, 413 на превышение тела) уходили бы
    # голыми. CSP намеренно НЕ дублируется: его источник — app-middleware (setdefault);
    # разъехавшийся nginx-дубль ужимал бы политику до пересечения и ломал wavesurfer.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;          # api доверяет только https
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;                               # SSE (v1.x): без буферизации
        proxy_read_timeout 3600s;
    }
}
